project: hashmaker
type: docker-build

version:
  source: git-commit

build:
  context: "."
  dockerfile: Dockerfile

port: 8080

healthcheck:
  mode: http
  path: /
  port: 8080
  interval: 10s
  timeout: 5s

environment:
  PORT: "8080"

resources:
  memory: 256m
  cpus: "0.5"

instances:
  production:
    domain: hashmaker.mtc.academy
